<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Networking Terms Reference - APM Documentation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>📡 Networking Terms Reference</h1>
            <p class="subtitle">Complete guide to essential networking acronyms and concepts</p>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Sidebar Navigation -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>📚 Terms</h2>
                </div>
                <div class="term-list">
                    <button class="term-btn active" data-term="terms">All Terms</button>
                    <button class="term-btn" data-term="sdn">SDN</button>
                    <button class="term-btn" data-term="sdwan">SD-WAN</button>
                    <button class="term-btn" data-term="mpls">MPLS</button>
                </div>
                <div class="sidebar-footer">
                    <p class="hint">💡 Click any term to view details</p>
                </div>
            </aside>

            <!-- Content Area -->
            <section class="content-area">
                <div id="content" class="content">
                    <!-- Content will be injected here by JavaScript -->
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer>
            <p>&copy; 2026 APM Networking Documentation | <a href="https://github.com/pranav5127/npm-apm" style="color: inherit; text-decoration: underline;">View on GitHub</a></p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
